<header class="flex p-4">
  <button
    type="button"
    class="flex items-center gap-2 w-full text-base py-2 px-4 h-10 rounded-xs border border-neutral-500 cursor-pointer"
    (click)="show()"
  >
    <drc-icon>search</drc-icon>
    {{ placeholder() }}
  </button>
</header>

<ng-template cdkPortal>
  <drc-search-panel
    cdkTrapFocus
    cdkTrapFocusAutoCapture
    (closeOverlay)="close()"
  />
</ng-template>
