@if (isLoading()) {
  <div>Loading...</div>
} @else if (error()) {
  <div>{{ error() }}</div>
} @else {
  <div>
    <p class="text-2xl mb-2">
      Total Count: <b>{{ totalCount() }}</b>
    </p>

    <ul class="space-y-6">
      @for (user of users(); track user.id) {
        <li>
          <drc-user-card [user]="user" />
        </li>
      }
    </ul>
  </div>
}
