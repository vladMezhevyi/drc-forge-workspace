<div #containerRef>
  <input
    #inputRef
    cdkOverlayOrigin
    #origin="cdkOverlayOrigin"
    type="text"
    role="combobox"
    drcInput
    aria-autocomplete="list"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-controls]="panelId()"
    [attr.aria-labelledby]="id()"
    [attr.placeholder]="placeholder()"
    [disabled]="disabled()"
    [value]="inputValue()"
    (focus)="onFocus()"
    (blur)="onBlur()"
    (input)="onInput($event)"
    (keydown)="onKeydown($event)"
  />
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="origin"
  [cdkConnectedOverlayOpen]="isOpen()"
  [cdkConnectedOverlayWidth]="containerWidth()"
  (overlayOutsideClick)="close()"
  (detach)="onDetach()"
>
  <ul
    role="listbox"
    class="block w-full bg-body border border-neutral-400 py-2 shadow-md overflow-y-auto overflow-x-hidden"
    [id]="panelId()"
    [attr.labelledby]="id()"
    [style.max-height]="maxHeight()"
  >
    @for (item of suggestions(); track resolveValue(item)) {
      <li
        role="option"
        tabindex="-1"
        class="flex cursor-pointer select-none items-center px-3 py-2 text-sm hover:bg-primary-50"
        [id]="buildItemId($index)"
        [class.bg-neutral-200]="isSelected(item)"
        [class.bg-neutral-300]="activeIndex() === $index"
        [attr.aria-selected]="isSelected(item)"
        [attr.aria-disabled]="isItemDisabled(item)"
        (click)="selectItem(item)"
        (keydown.enter)="selectItem(item)"
      >
        @if (itemTemplate(); as template) {
          <ng-container
            [ngTemplateOutlet]="template"
            [ngTemplateOutletContext]="{
              item,
              $implicit: item,
              index: $index,
            }"
          />
        } @else {
          <span class="inline-block w-full min-w-0 truncate">
            {{ resolveLabel(item) }}
          </span>
        }
      </li>
    } @empty {
      <li class="py-1 px-2">
        @if (emptyTemplate(); as template) {
          <ng-container [ngTemplateOutlet]="template" />
        } @else {
          <span>No results found</span>
        }
      </li>
    }
  </ul>
</ng-template>
